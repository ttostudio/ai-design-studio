services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: designstudio
      POSTGRES_PASSWORD: designstudio
      POSTGRES_DB: designstudio
    ports:
      - "5437:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U designstudio -d designstudio"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3800:3800"
    environment:
      DATABASE_URL: postgresql://designstudio:designstudio@db:5432/designstudio
      COMFYUI_API_URL: http://host.docker.internal:3300
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "3801:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  db_data:
  caddy_data:
  caddy_config:
