name: PR Review
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ttostudio/gemma-pr-reviewer@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          model: 'gemma4:e2b'
          language: 'japanese'
